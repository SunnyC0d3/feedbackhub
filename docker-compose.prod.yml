# ---------------------------------------------------------------
# Production — EC2 t2.micro
#
# Usage:
#   IMAGE_TAG=<git-sha> docker compose -f docker-compose.prod.yml up -d
#
# The EC2 instance startup script writes .env.prod from SSM
# Parameter Store before running this file. The .env.prod file
# is never committed to the repository.
#
# Queue driver: sqs (durable, managed)
# Redis: cache only — no persistence, no RDB/AOF
# RDS: managed externally, not in this file
# ---------------------------------------------------------------

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: feedbackhub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped

  web:
    image: ${ECR_REGISTRY}/feedbackhub/app:${IMAGE_TAG:-latest}
    container_name: feedbackhub-web
    expose:
      - "9000"
    env_file:
      - .env.prod
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    image: ${ECR_REGISTRY}/feedbackhub/app:${IMAGE_TAG:-latest}
    container_name: feedbackhub-worker
    command: ["php", "artisan", "queue:work", "sqs", "--sleep=3", "--tries=3", "--timeout=90", "--max-time=3600"]
    env_file:
      - .env.prod
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: feedbackhub-redis
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
