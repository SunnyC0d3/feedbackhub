# ---------------------------------------------------------------
# Local development only — do NOT use in production.
# Queue driver: redis (no SQS needed locally)
# ---------------------------------------------------------------

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: feedbackhub-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  web:
    build:
      context: .
      target: app
    container_name: feedbackhub-web
    volumes:
      - .:/var/www/html           # mounts host vendor too — dev deps available locally
    env_file:
      - .env
    environment:
      # Override .env values that differ inside Docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_PASSWORD: "secret"
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      target: app
    container_name: feedbackhub-worker
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=90"]
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_PASSWORD: "secret"
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: feedbackhub-mysql
    command: --default-authentication-plugin=mysql_native_password --skip-name-resolve
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "secret"
      MYSQL_DATABASE: feedbackhub
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: feedbackhub-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
