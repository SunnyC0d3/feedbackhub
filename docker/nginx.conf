# ---------------------------------------------------------------
# FeedbackHub — nginx reverse proxy
#
# HTTP block (port 80):
#   - In production: redirects to HTTPS (uncomment redirect block)
#   - In local dev / initial setup: proxies directly to PHP-FPM
#
# HTTPS block (port 443):
#   - Uncomment and fill in your domain + cert paths once
#     Let's Encrypt certs exist (run certbot first)
# ---------------------------------------------------------------

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    # Health check endpoint (bypass PHP-FPM)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass feedbackhub-web:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
    }
}

